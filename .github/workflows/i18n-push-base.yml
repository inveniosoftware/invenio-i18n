name: "i18n: push translations (reusable workflow)"
on:
  workflow_call:
    inputs:
      extract-backend:
        required: true
        type: boolean
        default: true
      backend-package-path:
        required: false
        type: string
      frontend-package-path:
        required: false
        type: string
    secrets:
      TRANSIFEX_TOKEN:
        required: true

jobs:
  i18n-extract:
    runs-on: ubuntu-24.04
    env:
      PYTHON-VERSION: 3.14
      NODE-VERSION: 24
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # setup python
      - name: Set up Python ${{ env.PYTHON-VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON-VERSION }}

      # install dependencies
      - name: Install dependencies
        run: |
          # python 3.12 doesn't have it anymore out of the box
          pip install setuptools
          pip install -e ".[all]"

      # extract backend messages
      - name: Extract backend messages
        if: ${{ inputs.extract-backend && inputs.backend-package-path == '' }}
        run: |
          python setup.py extract_messages

      # case for packages using pyproject.toml instead of setup.py
      - name: Extract backend messages from package path
        if: ${{ inputs.extract-backend && inputs.backend-package-path != '' }}
        run: |
          pybabel extract -F pyproject.toml -o ${{ inputs.backend-package-path }}/translations/messages.pot ${{ inputs.backend-package-path }}

      # setup node
      - name: Setup node
        if: ${{ inputs.frontend-package-path != '' }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE-VERSION }}

      # extract frontend messages
      - name: Extract frontend messages
        if: ${{ inputs.frontend-package-path != '' }}
        working-directory: ./${{ inputs.frontend-package-path }}
        # installing from package-lock.json
        run: |
          npm ci
          npm run extract_messages

      # Push only source file to transifex
      - name: Push source file using transifex client
        uses: transifex/cli-action@v2
        with:
          token: ${{ secrets.TRANSIFEX_TOKEN }}
          args: push -s

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "i18n: push translations"
          title: "i18n: push translations"
          body: "i18n: push translations"
          branch: 101-translations-push # name of branch which PR is created from
          delete-branch: true # delete branch once merged,closed
